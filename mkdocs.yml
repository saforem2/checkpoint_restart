site_name: Exacheckmate
site_url: https://example.com/exacheckmate
repo_url: https://github.com/argonne-lcf/checkpoint_restart
site_description: "Documentation for the exacheckmate checkpoint/restart helpers"
theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: amber
nav:
  - Home: index.md
plugins:
  - search
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
